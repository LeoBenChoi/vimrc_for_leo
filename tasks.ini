# ============================================================
# 全局任务配置文件 (C:\Users\Leo\.vim\tasks.ini)
# ============================================================
# 这是 plugin/33-asynctasks.vim 的配置文件
# AsyncTasks 会自动读取这里的配置，作用于所有项目
# 
# 配置文件位置：~/.vim/tasks.ini
# 对应插件配置：plugin/33-asynctasks.vim
# ============================================================

# ------------------------------------------------------------
# 1. 运行任务 [file-run] (对应 F5)
# ------------------------------------------------------------

[file-run]
# 默认行为：如果是 Go 文件
command:go=go run "$(VIM_FILEPATH)"
# 如果是 Python 文件
command:python=python "$(VIM_FILEPATH)"
# 如果是 Shell 脚本
command:sh=sh "$(VIM_FILEPATH)"
# 如果是 Batch 脚本
command:dosbatch="$(VIM_FILEPATH)"

# 工作目录：$(VIM_FILEDIR) 代表当前文件所在目录，$(VIM_ROOT) 代表项目根目录
cwd=$(VIM_ROOT)

# 输出模式：terminal (在内置终端显示，适合有交互的程序)，quickfix (在底部显示，适合看日志)
output=terminal

# 程序运行结束后不自动关闭终端窗口（方便查看输出结果）
close=0

# ------------------------------------------------------------
# 2. 构建任务 [file-build] (对应 F9)
# ------------------------------------------------------------

[file-build]
command:go=go build .
command:c=gcc "$(VIM_FILEPATH)" -o "$(VIM_FILEDIR)/$(VIM_FILENOEXT)"

cwd=$(VIM_ROOT)
output=quickfix
# 运行前自动保存文件
save=1 

# ------------------------------------------------------------
# 3. 测试任务 (通过 F6 菜单调用)
# ------------------------------------------------------------

[go-test]
command=go test -v ./...
cwd=$(VIM_ROOT)
output=quickfix
errorformat=%f:%l:%m
save=1

[go-mod-tidy]
command=go mod tidy
cwd=$(VIM_ROOT)
output=quickfix
save=1
